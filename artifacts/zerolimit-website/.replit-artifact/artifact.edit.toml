kind = "web"
previewPath = "/zerolimit/"
title = "Zero Limit Automation Website"
version = "1.0.1"
id = "artifacts/zerolimit-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/zerolimit/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/zerolimit-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zerolimit-website", "run", "build" ]
publicDir = "artifacts/zerolimit-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/zerolimit/"
