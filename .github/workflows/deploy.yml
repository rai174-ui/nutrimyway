name: Build and Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build API server (libs)
        run: pnpm run typecheck:libs

      - name: Build member app
        run: PORT=8080 BASE_PATH=/ pnpm --filter @workspace/nutrimyway run build

      - name: Build admin panel
        run: BASE_PATH=/admin pnpm --filter @workspace/nutrimyway-admin run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/admin
          cp -r artifacts/nutrimyway/dist/public/* deploy/
          cp -r artifacts/nutrimyway-admin/dist/public/* deploy/admin/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nutrimyway-hostinger
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nutrimyway-hostinger
          path: deploy/

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP (lftp)
        run: |
          lftp -u ${{ secrets.HOSTINGER_USERNAME }},${{ secrets.HOSTINGER_PASSWORD }} 145.79.213.151 <<EOF
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          lcd deploy
          cd public_html
          mirror -R --parallel=2 --verbose
          bye
          EOF
